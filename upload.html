<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - FlowKit AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;line-height:1.6}
        .mobile-nav{display:none;position:fixed;top:0;left:0;right:0;z-index:1000;padding:16px 24px;background:rgba(10,10,15,0.95)}
        .hamburger{cursor:pointer;background:none;border:none;padding:8px;display:flex;flex-direction:column;gap:5px}
        .hamburger span{display:block;width:24px;height:2px;background:#fff}
        .logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
        .sidebar{width:260px;background:rgba(15,15,25,0.95);padding:24px;position:fixed;height:100vh}
        .main-content{margin-left:260px;padding:40px;min-height:100vh}
        h1{font-size:28px;font-weight:700}
        .form-grid{display:grid;grid-template-columns:2fr 1fr;gap:40px}
        .form-group{margin-bottom:24px}
        label{display:block;margin-bottom:8px;font-weight:500;font-size:14px}
        input,select,textarea{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px}
        textarea{min-height:140px;resize:vertical}
        select option{background:#0a0a0f}
        .btn{padding:14px 28px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all .3s}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(102,126,234,0.4)}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .preview-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;position:sticky;top:40px}
        .platform-tag{background:rgba(16,185,129,0.2);color:#10b981;padding:4px 10px;border-radius:6px;font-size:11px}
        .file-upload{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;border:2px dashed rgba(255,255,255,0.2);border-radius:12px;background:rgba(255,255,255,0.02);cursor:pointer;transition:all .3s}
        .file-upload:hover{border-color:rgba(102,126,234,0.5);background:rgba(102,126,234,0.05)}
        .success-message{padding:16px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:10px;color:#10b981;margin-bottom:20px}
        .error-message{padding:16px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;color:#ef4444;margin-bottom:20px}
        @media(max-width:768px){.sidebar{display:none}.mobile-nav{display:flex;justify-content:space-between;align-items:center}.main-content{margin-left:0;padding:80px 20px 40px}.form-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <nav class="mobile-nav">
        <a href="index.html" class="logo">FlowKit AI</a>
    </nav>
    <aside class="sidebar">
        <a href="index.html" style="font-size:24px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;display:block;margin-bottom:40px">FlowKit AI</a>
        <a href="dashboard.html" style="display:block;padding:12px 16px;color:#94a3b8;text-decoration:none">Dashboard</a>
        <a href="upload.html" style="display:block;padding:12px 16px;color:#fff;text-decoration:none;background:rgba(102,126,234,0.1);border-radius:10px">Upload</a>
    </aside>
    <main class="main-content">
        <h1>Upload Workflow</h1>
        <p style="color:#94a3b8;margin:8px 0 32px">List your AI workflow for sale. You keep 90%.</p>
        
        <div id="messageContainer"></div>
        <div id="authWarning" style="display:none;padding:16px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;color:#f59e0b;margin-bottom:20px">
            ⚠️ Please <a href="signup.html" style="color:#a78bfa">sign in</a> to upload workflows.
        </div>
        
        <div class="form-grid">
            <form id="uploadForm">
                <div class="form-group">
                    <label>Workflow Title</label>
                    <input type="text" id="title" placeholder="e.g., Viral Tweet Generator" required>
                </div>
                <div class="form-group">
                    <label>Platform</label>
                    <select id="platform" required>
                        <option value="">Select AI Platform...</option>
                        <option value="chatgpt">ChatGPT / OpenAI</option>
                        <option value="claude">Claude / Anthropic</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="midjourney">Midjourney</option>
                        <option value="dalle">DALL-E</option>
                        <option value="cursor">Cursor</option>
                        <option value="perplexity">Perplexity</option>
                        <option value="stable-diffusion">Stable Diffusion</option>
                        <option value="grok">Grok / xAI</option>
                        <option value="universal">Universal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="">Select category...</option>
                        <option value="content">Content Creation</option>
                        <option value="social">Social Media</option>
                        <option value="seo">SEO & Marketing</option>
                        <option value="email">Email Marketing</option>
                        <option value="ads">Advertising</option>
                        <option value="code">Programming</option>
                        <option value="data">Data Analysis</option>
                        <option value="automation">Automation</option>
                        <option value="design">Design & Creative</option>
                        <option value="writing">Writing & Copy</option>
                        <option value="research">Research</option>
                        <option value="productivity">Productivity</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (USD)</label>
                    <input type="number" id="price" min="5" max="500" placeholder="29" required>
                    <p style="color:#64748b;font-size:13px;margin-top:8px">You keep 90%: <strong id="earn" style="color:#10b981">$0</strong></p>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="desc" placeholder="What does your workflow do?" required></textarea>
                </div>
                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="tags" placeholder="AI, twitter, viral, marketing">
                </div>
                <div class="form-group">
                    <label>What Buyer Gets</label>
                    <textarea id="deliverables" placeholder="List deliverables..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Workflow Content (Full)</label>
                    <textarea id="content" placeholder="Paste full workflow/prompts here..." style="min-height:200px" required></textarea>
                </div>
                <div class="form-group">
                    <label>Example Images</label>
                    <input type="file" id="exampleImages" accept="image/*" multiple style="display:none">
                    <div class="file-upload" onclick="document.getElementById('exampleImages').click()">
                        <div style="font-size:32px;margin-bottom:12px">📸</div>
                        <p style="color:#94a3b8;font-size:14px">Click to upload screenshots</p>
                        <p style="color:#64748b;font-size:12px">Before/after images (max 4)</p>
                    </div>
                    <div id="imagePreviewContainer" style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px"></div>
                </div>
                <button type="submit" class="btn" id="submitBtn">Publish Workflow</button>
            </form>
            <div class="preview-box">
                <p style="color:#64748b;font-size:12px;text-transform:uppercase;margin-bottom:16px">Preview</p>
                <div class="preview-card">
                    <span class="platform-tag" id="previewPlatform">Platform</span>
                    <h4 id="previewTitle">Your Workflow Title</h4>
                    <p style="color:#94a3b8;font-size:14px" id="previewDesc">Description preview...</p>
                    <p style="color:#10b981;font-weight:600;margin-top:12px" id="previewPrice">$0</p>
                </div>
            </div>
        </div>
    </main>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// Supabase Config
const SUPABASE_URL = 'https://jmlskgsffhuthqgexyfbg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptbHNrZ3NmZmh1dGhxZXh5ZmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI3NzksImV4cCI6MjA4ODM4ODc3OX0.rZTajagnrtmSW1LMYCwQobP5l57RNKzPDmEsN9eRtOk';

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
let uploadedImages = [];

// Check auth on load
async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    currentUser = session?.user || null;
    
    if (!currentUser) {
        document.getElementById('authWarning').style.display = 'block';
        document.getElementById('uploadForm').style.opacity = '0.5';
        document.getElementById('submitBtn').disabled = true;
    }
}

// Live preview updates
document.getElementById('title').addEventListener('input', (e) => {
    document.getElementById('previewTitle').textContent = e.target.value || 'Your Workflow Title';
});
document.getElementById('desc').addEventListener('input', (e) => {
    document.getElementById('previewDesc').textContent = e.target.value || 'Description preview...';
});
document.getElementById('price').addEventListener('input', (e) => {
    const price = parseInt(e.target.value) || 0;
    document.getElementById('previewPrice').textContent = '$' + price;
    document.getElementById('earn').textContent = '$' + Math.floor(price * 0.9);
});
document.getElementById('platform').addEventListener('change', (e) => {
    const platform = e.target.options[e.target.selectedIndex].text;
    document.getElementById('previewPlatform').textContent = platform.split('/')[0].trim();
});

// Image upload preview
document.getElementById('exampleImages').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    const container = document.getElementById('imagePreviewContainer');
    
    for (const file of files) {
        if (uploadedImages.length >= 4) break;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const div = document.createElement('div');
            div.innerHTML = `
                <div style="position:relative;display:inline-block">
                    <img src="${e.target.result}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid rgba(102,126,234,0.5)">
                    <span onclick="this.parentElement.remove()" style="position:absolute;top:-8px;right:-8px;width:20px;height:20px;background:#ef4444;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:white">×</span>
                </div>
            `;
            container.appendChild(div);
            uploadedImages.push(file);
        };
        reader.readAsDataURL(file);
    }
});

// Form submission
async function handleSubmit(e) {
    e.preventDefault();
    
    if (!currentUser) {
        showMessage('Please sign in first', 'error');
        return;
    }
    
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Publishing...';
    
    try {
        const title = document.getElementById('title').value;
        const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        const price = parseInt(document.getElementById('price').value);
        
        // Upload images first
        const imageUrls = [];
        for (const file of uploadedImages.slice(0, 4)) {
            const fileName = `${currentUser.id}/${Date.now()}-${file.name}`;
            const { data, error } = await supabase.storage
                .from('images')
                .upload(fileName, file);
            if (error) throw error;
            
            const { data: { publicUrl } } = supabase.storage
                .from('images')
                .getPublicUrl(fileName);
            imageUrls.push(publicUrl);
        }
        
        // Create workflow
        const { data, error } = await supabase
            .from('workflows')
            .insert([{
                seller_id: currentUser.id,
                title: title,
                slug: slug,
                description: document.getElementById('desc').value,
                preview_text: document.getElementById('desc').value.substring(0, 120) + '...',
                content: document.getElementById('content').value,
                platform: document.getElementById('platform').value,
                category: document.getElementById('category').value,
                price: price * 100, // cents
                tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t),
                deliverables: document.getElementById('deliverables').value.split('\n').filter(l => l.trim()),
                example_images: imageUrls,
                status: 'published'
            }])
            .select()
            .single();
        
        if (error) throw error;
        
        showMessage('Workflow published! Redirecting...', 'success');
        setTimeout(() => window.location.href = `workflow.html?id=${data.id}`, 1500);
        
    } catch (err) {
        showMessage('Error: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Publish Workflow';
    }
}

function showMessage(msg,
type) {
    const div = document.getElementById('messageContainer');
    div.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">${msg}</div>`;
    setTimeout(() => div.innerHTML = '', 5000);
}

document.getElementById('uploadForm').addEventListener('submit', handleSubmit);
init();
</script>
</body>
</html>
