<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Workflow — FlowKit AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; line-height: 1.6; }
    
    /* Navigation */
    .mobile-nav { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 16px 24px; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
    .mobile-nav-content { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .hamburger { cursor: pointer; background: none; border: none; padding: 8px; display: flex; flex-direction: column; gap: 5px; z-index: 1001; }
    .hamburger span { display: block; width: 24px; height: 2px; background: #fff; transition: all 0.3s; }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
    .mobile-menu { position: fixed; top: 0; right: -100%; width: 300px; height: 100vh; background: rgba(10,10,15,0.98); z-index: 999; padding: 80px 20px 20px; transition: right 0.3s ease; overflow-y: auto; }
    .mobile-menu.active { right: 0; }
    .mobile-menu a { display: block; color: #fff; text-decoration: none; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 500; }
    .mobile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 998; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .mobile-overlay.active { opacity: 1; visibility: visible; }
    
    .sidebar { width: 260px; background: rgba(15,15,25,0.95); border-right: 1px solid rgba(255,255,255,0.05); padding: 24px; position: fixed; height: 100vh; }
    .sidebar-logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; display: block; text-decoration: none; }
    .nav-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 12px; }
    .nav-item { display: block; padding: 12px 16px; color: #94a3b8; text-decoration: none; border-radius: 10px; margin-bottom: 4px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(102,126,234,0.1); color: #fff; }
    
    .main-content { margin-left: 260px; padding: 40px; min-height: 100vh; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; margin-bottom: 32px; }
    .form-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
    .form-group { margin-bottom: 24px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
    label span { color: #64748b; font-weight: 400; }
    input, select, textarea { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 15px; font-family: inherit; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
    textarea { min-height: 140px; resize: vertical; }
    
    /* File Upload */
    .file-zone { border: 2px dashed rgba(102,126,234,0.3); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .file-zone:hover, .file-zone.drag-over { border-color: #667eea; background: rgba(102,126,234,0.05); }
    .file-zone input { display: none; }
    .file-zone-icon { font-size: 40px; color: #667eea; margin-bottom: 12px; }
    .file-zone-text { color: #94a3b8; }
    .file-zone-text strong { color: #667eea; }
    .file-zone-hint { font-size: 13px; color: #64748b; margin-top: 8px; }
    .file-selected { background: rgba(16,185,129,0.1); border-color: #10b981; border-radius: 10px; padding: 16px; display: flex; align-items: center; gap: 16px; }
    .file-selected-icon { color: #10b981; font-size: 24px; }
    .file-selected-info { flex: 1; }
    .file-selected-name { font-weight: 500; margin-bottom: 4px; }
    .file-selected-size { font-size: 13px; color: #64748b; }
    .file-selected-remove { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .file-selected-remove:hover { background: rgba(239,68,68,0.1); color: #ef4444; border-color: #ef4444; }
    
    /* Tags */
    .tags-input { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; min-height: 52px; align-items: center; }
    .tags-input:focus-within { border-color: #667eea; }
    .tag { background: rgba(102,126,234,0.2); color: #a78bfa; padding: 4px 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .tag-remove { cursor: pointer; opacity: 0.6; }
    .tag-remove:hover { opacity: 1; }
    .tags-input input { flex: 1; min-width: 80px; border: none; background: transparent; padding: 8px; outline: none; }
    .tags-hint { font-size: 13px; color: #64748b; margin-top: 8px; }
    
    .price-wrap { position: relative; max-width: 180px; }
    .price-wrap::before { content: '$'; position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #64748b; }
    .price-wrap input { padding-left: 40px; }
    
    .btn { padding: 14px 28px; background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(102,126,234,0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
    
    /* Preview */
    .preview-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; position: sticky; top: 40px; }
    .preview-label { color: #64748b; font-size: 12px; text-transform: uppercase; margin-bottom: 16px; }
    .preview-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding
