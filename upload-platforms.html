<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload - FlowKit AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;line-height:1.6}
.mobile-nav{display:none;position:fixed;top:0;left:0;right:0;z-index:1000;padding:16px 24px;background:rgba(10,10,15,0.95)}
.hamburger{cursor:pointer;background:none;border:none;padding:8px;display:flex;flex-direction:column;gap:5px}
.hamburger span{display:block;width:24px;height:2px;background:#fff}
.logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.mobile-menu{position:fixed;top:0;right:-100%;width:300px;height:100vh;background:rgba(10,10,15,0.98);z-index:999;padding:80px 20px 20px;transition:right 0.3s}
.sidebar{width:260px;background:rgba(15,15,25,0.95);padding:24px;position:fixed;height:100vh}
.main-content{margin-left:260px;padding:40px;min-height:100vh}
h1{font-size:28px;font-weight:700}
.form-grid{display:grid;grid-template-columns:2fr 1fr;gap:40px}
.form-group{margin-bottom:24px}
label{display:block;margin-bottom:8px;font-weight:500;font-size:14px}
input,select,textarea{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px}
textarea{min-height:140px;resize:vertical}
select option{background:#0a0a0f}
.btn{padding:14px 28px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer}
.preview-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;position:sticky;top:40px}
.preview-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px}
.preview-card h4{font-size:18px;margin:12px 0}
.platform-tag{background:rgba(16,185,129,0.2);color:#10b981;padding:4px 10px;border-radius:6px;font-size:11px}
@media(max-width:768px){.sidebar{display:none}.mobile-nav{display:flex;justify-content:space-between;align-items:center}.main-content{margin-left:0;padding:80px 20px 40px}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="mobile-nav">
<a href="index.html" class="logo">FlowKit AI</a>
<button class="hamburger" id="menuBtn"><span></span><span></span><span></span></button>
</nav>

<aside class="sidebar">
<a href="index.html" style="font-size:24px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;display:block;margin-bottom:40px">FlowKit AI</a>
<a href="dashboard.html" style="display:block;padding:12px 16px;color:#94a3b8;text-decoration:none">Dashboard</a>
<a href="upload.html" style="display:block;padding:12px 16px;color:#fff;text-decoration:none;background:rgba(102,126,234,0.1);border-radius:10px">Upload</a>
</aside>

<main class="main-content">
<h1>Upload Workflow</h1>
<p style="color:#94a3b8;margin:8px 0 32px">List your AI workflow or prompt for sale</p>

<div class="form-grid">
<form id="uploadForm">
<div class="form-group">
<label>Workflow Title</label>
<input type="text" id="title" placeholder="e.g., Viral Tweet Generator" required>
</div>

<div class="form-group">
<label>Platform *NEW!*</label>
<select id="platform" required>
<option value="">Select AI Platform...</option>
<option value="chatgpt">ChatGPT / OpenAI</option>
<option value="claude">Claude / Anthropic</option>
<option value="gemini">Google Gemini</option>
<option value="midjourney">Midjourney</option>
<option value="dalle">DALL-E</option>
<option value="cursor">Cursor</option>
<option value="perplexity">Perplexity</option>
<option value="stable-diffusion">Stable Diffusion</option>
<option value="grok">Grok / xAI</option>
<option value="universal">Universal / Works on All</option>
</select>
</div>

<div class="form-group">
<label>Category *NEW!*</label>
<select id="category" required>
<option value="">Select category...</option>
<option value="content">Content Creation</option>
<option value="social">Social Media</option>
<option value="seo">SEO & Marketing</option>
<option value="email">Email Marketing</option>
<option value="ads">Advertising</option>
<option value="code">Programming</option>
<option value="data">Data Analysis</option>
<option value="automation">Automation</option>
<option value="design">Design & Creative</option>
<option value="writing">Writing & Copy</option>
<option value="research">Research</option>
<option value="productivity">Productivity</option>
</select>
</div>

<div class="form-group">
<label>Price (USD)</label>
<input type="number" id="price" min="5" max="500" placeholder="29" required>
<p style="color:#64748b;font-size:13px;margin-top:8px">You keep 90%: <strong id="earn" style="color:#10b981">$0</strong></p>
</div>

<div class="form-group">
<label>Description</label>
<textarea id="desc" placeholder="What does your workflow do? What results can buyers expect?" required></textarea>
</div>

<div class="form-group">
<label>Tags (comma separated)</label>
<input type="text" id="tags" placeholder="AI, twitter, viral, marketing">
</div>

<div class="form-group">
<label>What You'll Get</label>
<textarea id="deliverables" placeholder="List exactly what the buyer receives..." required></textarea>
</div>

<button type="submit" class="btn">Publish Workflow</button>
</form>

<div class="preview-box">
<p style="color:#64748b;font-size:12px;text-transform:uppercase;margin-bottom:16px">Live Preview</p>
<div class="preview-card">
<span class="platform-tag" id="pPlatform">Platform</span>
<h4 id="pTitle">Your Title</h4>
<p style="color:#94a3b8;margin:8px 0"><strong>Category:</strong> <span id="pCat">-</span></p>
<p style="color:#94a3b8;margin:8px 0"><strong>Price:</strong> $<span id="pPrice">0</span></p>
</div>
</div>
</div>
</main>

<script>
const title=document.getElementById('title');
const platform=document.getElementById('platform');
const category=document.getElementById('category');
const price=document.getElementById('price');

function update(){
document.getElementById('pTitle').textContent=title.value||'Your Title';
document.getElementById('pPlatform').textContent=platform.options[platform.selectedIndex]?.text||'Platform';
document.getElementById('pCat').textContent=category.options[category.selectedIndex]?.text||'-';
document.getElementById('pPrice').textContent=price.value||'0';
const p=parseInt(price.value)||0;
document.getElementById('earn').textContent='$'+Math.floor(p*0.9);
}

[title,platform,category,price].forEach(el=>el.addEventListener('input',update));
update();
</script>
</body>
</html>
