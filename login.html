<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — FlowKit AI</title>
<meta name="description" content="Log in to your FlowKit AI account. Access your workflows, sales dashboard, and seller tools.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; line-height: 1.6; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
.navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 20px 0; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
.nav-content { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.hamburger { cursor: pointer; background: none; border: none; padding: 8px; z-index: 1001; display: flex; flex-direction: column; gap: 5px; }
.hamburger span { display: block; width: 24px; height: 2px; background: #fff; transition: all 0.3s; }
.hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
.mobile-menu { position: fixed; top: 0; right: -100%; width: 300px; height: 100vh; background: rgba(10,10,15,0.98); backdrop-filter: blur(20px); border-left: 1px solid rgba(255,255,255,0.1); z-index: 999; padding: 80px 24px 24px; transition: right 0.3s ease; }
.mobile-menu.active { right: 0; }
.mobile-menu a { display: block; color: #fff; text-decoration: none; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 500; font-size: 16px; transition: color 0.2s; }
.mobile-menu a:hover { color: #a78bfa; }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 998; opacity: 0; visibility: hidden; transition: all 0.3s; }
.overlay.active { opacity: 1; visibility: visible; }
.hero { padding: 140px 0 40px; text-align: center; }
.hero h1 { font-size: clamp(32px, 5vw, 48px); font-weight: 800; margin-bottom: 12px; }
.hero p { color: #94a3b8; font-size: 18px; }
.login-container { max-width: 480px; margin: 0 auto 80px; padding: 0 24px; }
.login-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: #e2e8f0; }
.form-group input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 16px; transition: all 0.3s; }
.form-group input:focus { outline: none; border-color: #667eea; background: rgba(102,126,234,0.05); }
.form-group input::placeholder { color: #64748b; }
.submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(102,126,234,0.4); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.submit-btn.success { background: linear-gradient(135deg, #10b981, #059669); }
.signup-link { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 14px; }
.signup-link a { color: #a78bfa; text-decoration: none; font-weight: 500; }
.signup-link a:hover { text-decoration: underline; }
.forgot-link { text-align: center; margin-top: 16px; }
.forgot-link a { color: #64748b; text-decoration: none; font-size: 14px; }
.forgot-link a:hover { color: #a78bfa; }
.error-message { padding: 12px 16px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 10px; color: #ef4444; font-size: 14px; margin-bottom: 20px; display: none; }
.success-message { padding: 12px 16px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 10px; color: #10b981; font-size: 14px; margin-bottom: 20px; display: none; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
footer { padding: 40px 0; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; color: #64748b; font-size: 14px; }
@media (max-width: 768px) { .login-card { padding: 24px; } }
</style>
</head>
<body>
<nav class="navbar">
<div class="container">
<div class="nav-content">
<a href="index.html" class="logo">FlowKit AI</a>
<button class="hamburger" id="menuToggle" aria-label="Menu">
<span></span><span></span><span></span>
</button>
</div>
</div>
</nav>

<div class="overlay" id="overlay"></div>
<div class="mobile-menu" id="mobileMenu">
<a href="index.html">Home</a>
<a href="browse.html">Browse</a>
<a href="sell.html">Sell</a>
<a href="free-tool.html">Free Tool</a>
<a href="index.html#waitlist">Join Waitlist</a>
</div>

<section class="hero">
<div class="container">
<h1>Welcome Back</h1>
<p>Log in to your FlowKit AI account</p>
</div>
</section>

<div class="login-container">
<div class="login-card">
<div id="errorMessage" class="error-message"></div>
<div id="successMessage" class="success-message"></div>

<form id="loginForm">
<div class="form-group">
<label for="email">Email Address</label>
<input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
</div>
<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
</div>
<button type="submit" class="submit-btn" id="submitBtn">Log In</button>
</form>

<div class="forgot-link">
<a href="#" id="forgotPassword">Forgot password?</a>
</div>

<p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>
</div>
</div>

<footer>
<div class="container">
<p>© 2026 FlowKit AI · Built with 💜 for AI creators</p>
</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://jmlskgsffhuthqgexyfbg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptbHNrZ3NmZmh1dGhxZXh5ZmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI3NzksImV4cCI6MjA4ODM4ODc3OX0.rZTajagnrtmSW1LMYCwQobP5l57RNKzPDmEsN9eRtOk';

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function toggleMenu() {
document.getElementById('menuToggle').classList.toggle('active');
document.getElementById('mobileMenu').classList.toggle('active');
document.getElementById('overlay').classList.toggle('active');
}

document.getElementById('menuToggle').addEventListener('click', toggleMenu);
document.getElementById('overlay').addEventListener('click', toggleMenu);
document.querySelectorAll('.mobile-menu a').forEach(link => link.addEventListener('click', toggleMenu));

const loginForm = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const errorMessage = document.getElementById('errorMessage');
const successMessage = document.getElementById('successMessage');

function showError(msg) {
errorMessage.textContent = msg;
errorMessage.style.display = 'block';
successMessage.style.display = 'none';
}

function showSuccess(msg) {
successMessage.textContent = msg;
successMessage.style.display = 'block';
errorMessage.style.display = 'none';
}

// Check if already logged in
async function checkSession() {
const { data: { session } } = await supabase.auth.getSession();
if (session) {
const returnUrl = new URLSearchParams(window.location.search).get('return') || 'dashboard.html';
window.location.href = returnUrl;
}
}
checkSession();

loginForm.addEventListener('submit', async (e) => {
e.preventDefault();

const email = document.getElementById('email').value.trim();
const password = document.getElementById('password').value;

submitBtn.disabled = true;
submitBtn.innerHTML = '<span class="spinner"></span> Logging in...';
errorMessage.style.display = 'none';

try {
const { data, error } = await supabase.auth.signInWithPassword({
email,
password
});

if (error) throw error;

if (data.session) {
showSuccess('Welcome back! Redirecting...');
submitBtn.innerHTML = '✓ Success!';
submitBtn.classList.add('success');

const returnUrl = new URLSearchParams(window.location.search).get('return') || 'dashboard.html';
setTimeout(() => window.location.href = returnUrl, 800);
}
} catch (err) {
showError(err.message || 'Invalid email or password');
submitBtn.disabled = false;
submitBtn.innerHTML = 'Log In';
}
});

// Forgot password
document.getElementById('forgotPassword').addEventListener('click', async (e) => {
e.preventDefault();
const email = document.getElementById('email').value.trim();

if (!email) {
showError('Please enter your email address first');
return;
}

submitBtn.disabled = true;
submitBtn.innerHTML = '<span class="spinner"></span> Sending...';

try {
const { error } = await supabase.auth.resetPasswordForEmail(email, {
redirectTo: window.location.origin + '/reset-password.html'
});

if (error) throw error;

showSuccess('Password reset link sent to your email');
submitBtn.disabled = false;
submitBtn.innerHTML = 'Log In';
} catch (err) {
showError(err.message || 'Failed to send reset link');
submitBtn.disabled = false;
submitBtn.innerHTML = 'Log In';
}
});
</script>
</body>
</html>
